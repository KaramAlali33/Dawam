<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>دوام - نظام إدارة الموارد البشرية</title>
  <meta name="description" content="نظام دوام لإدارة الموارد البشرية - Dawam HR Management System">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="error-box" style="position: fixed; top: 10px; right: 10px; z-index: 9999; background: rgba(220, 38, 38, 0.95); color: white; padding: 15px; border-radius: 8px; max-width: 450px; overflow-y: auto; max-height: 80vh; font-family: monospace; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: none;"></div>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      var box = document.getElementById('error-box');
      box.style.display = 'block';
      box.innerText += '\n' + message + ' \n' + (error && error.stack ? error.stack : '');
    };
  </script>
  <app-root></app-root>
</body>
</html>
