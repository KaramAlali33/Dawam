<div class="app-container">
  
  <!-- Top Navigation with Language Switcher -->
  <nav class="top-nav animate-fade-in">
    <div class="lang-selector">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color)">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </svg>
      <label for="lang-select">{{ 'LANGUAGE' | translate }}</label>
      <select id="lang-select" #langSelect (change)="setLanguage(langSelect.value)" [value]="translateService.currentLang">
        <option value="ar">🇦🇪 {{ 'ARABIC' | translate }}</option>
        <option value="en">🇬🇧 {{ 'ENGLISH' | translate }}</option>
      </select>
    </div>
  </nav>

  <!-- Login Area -->
  <main class="login-wrapper">
    <div class="login-card animate-fade-in">
      
      <div class="login-header">
        <div class="logo-icon">D</div>
        <h1 class="login-title">{{ 'HR_SYSTEM' | translate }}</h1>
        <p class="login-subtitle">{{ 'SYSTEM_SUBTITLE' | translate }}</p>
      </div>

      <form class="login-form" (submit)="$event.preventDefault()">
        
        <div class="form-group">
          <label class="form-label" for="email">{{ 'EMAIL_LABEL' | translate }}</label>
          <input type="email" id="email" class="form-input" [placeholder]="'EMAIL_PLACEHOLDER' | translate">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">{{ 'PASSWORD_LABEL' | translate }}</label>
          <input type="password" id="password" class="form-input" [placeholder]="'PASSWORD_PLACEHOLDER' | translate">
        </div>

        <button type="submit" class="btn btn-primary btn-login">
          {{ 'SIGN_IN_BUTTON' | translate }}
        </button>

        <div class="forgot-password">
          <a href="#">{{ 'FORGOT_PASSWORD' | translate }}</a>
        </div>

      </form>
    </div>
  </main>

</div>

<router-outlet></router-outlet>
